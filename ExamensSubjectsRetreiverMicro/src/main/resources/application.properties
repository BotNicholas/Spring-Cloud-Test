spring.application.name=ExamensSubjectsRetreiverMicro

server.port=8084

spring.cloud.stream.bindings.output.destination=subjects-topic
spring.cloud.stream.bindings.output.content-type=application/json

spring.cloud.stream.kafka.binder.brokers=localhost:9092


# Notes:

#Ключ (Kafka record key) в Spring Cloud Stream ставится двумя способами — декларативно или императивно.
#
#Способ 1 — декларативно, messageKeyExpression (SpEL)
#
#Kafka-специфичное producer-свойство биндинга:
#spring:
#  cloud:
#    stream:
#      kafka:
#        bindings:
#          accountRegistered-out-0:
#            producer:
#              messageKeyExpression: headers['e2eId']   # или payload.accountRef
#Binder вычислит SpEL и поставит результат ключом записи. Удобно, когда ключ всегда берётся из одного места.
#
#Способ 2 — императивно, header KafkaHeaders.KEY (под StreamBridge)
#
#Ставишь ключ прямо на исходящем сообщении:
#import org.springframework.kafka.support.KafkaHeaders;
#
#streamBridge.send("accountRegistered-out-0",
#    MessageBuilder.withPayload(outcome)
#        .setHeader(KafkaHeaders.KEY, accountRef)     // ← ключ записи
#        .setHeader("e2eId", e2eId)
#        .build());
#(Для Function — тот же .setHeader(KafkaHeaders.KEY, ...) на возвращаемом Message.)
#
#Это гибче: ключ можешь вычислять в коде (условно, из разных полей). Тебе, с StreamBridge, — самый естественный вариант.
#
#⚠️ Сериализатор ключа
#
#По умолчанию binder может ждать byte[]. Если шлёшь String-ключ — задай сериализатор, иначе поймаешь ClassCastException:
#spring:
#  cloud:
#    stream:
#      kafka:
#        binder:
#          configuration:
#            key.serializer: org.apache.kafka.common.serialization.StringSerializer
#(либо шли accountRef.getBytes(StandardCharsets.UTF_8).)




#Вариант с headers['e2eId'] — кто и когда кладёт
#
#Полная цепочка (случай Function):
#1. Treasury публикует в account.registrations и кладёт header e2eId на входящее сообщение.
#2. Твоя Function получает это сообщение (с header e2eId).
#3. Spring Cloud Stream для Function автоматически копирует заголовки входа → на выход (header propagation).
#4. Теперь у исходящего сообщения тоже есть header e2eId (скопирован).
#5. messageKeyExpression: headers['e2eId'] вычисляется против исходящего → находит этот header → ставит ключом.
#
#Кто кладёт: Treasury (на входе) + Spring (автопропагация вход→выход). Откуда берётся: из заголовков входящего сообщения.
#
#⚠️ Это работает только если: e2eId — это header (а не поле payload) на входе, И ты используешь Function (у неё автопропагация).
#
#Со StreamBridge автопропагации НЕТ — ты строишь новое сообщение. Чтобы headers['e2eId'] сработал, тебе пришлось бы самому сделать .setHeader("e2eId", e2eId). Но раз уж ставишь header руками — проще сразу .setHeader(KafkaHeaders.KEY, e2eId). Поэтому декларативный messageKeyExpression со StreamBridge смысла не даёт.
#
#Вариант с payload.e2eId — вот это чисто и для тебя работает
#
#Раз ты строишь envelope AccountOutcome и кладёшь туда e2eId полем:
#var outcome = AccountOutcome.success(accountRef, e2eId, walletAddress);
#то:
#messageKeyExpression: payload.e2eId
#читает поле e2eId из payload исходящего сообщения. А туда его положил ты сам, когда собирал envelope. Никаких заголовков, никакой автопропагации — значение уже в payload, выражение просто его достаёт.
#
#Итог — «откуда берётся и кто кладёт»
#
#┌──────────────────┬─────────────────────────┬───────────────────────────────────────────────────────────────────────────────────────────────┐
#│    Выражение     │      Читает откуда      │                                       Кто туда положил                                        │
#├──────────────────┼─────────────────────────┼───────────────────────────────────────────────────────────────────────────────────────────────┤
#│ headers['e2eId'] │ header исходящего       │ Function: автопропагация со входа (изначально Treasury). StreamBridge: ты сам .setHeader(...) │
#├──────────────────┼─────────────────────────┼───────────────────────────────────────────────────────────────────────────────────────────────┤
#│ payload.e2eId    │ поле payload исходящего │ ты, когда строил AccountOutcome                                                               │
#└──────────────────┴─────────────────────────┴───────────────────────────────────────────────────────────────────────────────────────────────┘
